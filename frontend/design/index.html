<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#09090B">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>NexusPOS — Enterprise POS Platform</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'system-ui', 'sans-serif'],
            mono: ['Space Mono', 'ui-monospace', 'monospace'],
          }
        }
      }
    }
  </script>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; overflow: hidden; }
    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: #09090B;
      color: #FAFAFA;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3F3F46; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #52525B; }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideIn {
      from { transform: translateX(100%); }
      to   { transform: translateX(0); }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .animate-fadeIn  { animation: fadeIn  0.2s ease-out both; }
    .animate-slideIn { animation: slideIn 0.25s ease-out both; }
    .animate-spin    { animation: spin    1s linear infinite; }
    .animate-pulse   { animation: pulse  2s ease-in-out infinite; }

    /* Hide number input spinners */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }

    /* Touch targets */
    button { -webkit-tap-highlight-color: transparent; }
    select { -webkit-appearance: none; appearance: none; }

    /* Scrollbar none utility */
    .scrollbar-none { scrollbar-width: none; }
    .scrollbar-none::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Module load order: data → state → ui → icons → nav → screens -->
  <script type="text/babel" src="pos-data.jsx"></script>
  <script type="text/babel" src="pos-state.jsx"></script>
  <script type="text/babel" src="pos-icons.jsx"></script>
  <script type="text/babel" src="pos-ui.jsx"></script>
  <script type="text/babel" src="pos-nav.jsx"></script>
  <script type="text/babel" src="pos-login.jsx"></script>
  <script type="text/babel" src="pos-checkout.jsx"></script>
  <script type="text/babel" src="pos-payment.jsx"></script>
  <script type="text/babel" src="pos-products.jsx"></script>
  <script type="text/babel" src="pos-inventory.jsx"></script>
  <script type="text/babel" src="pos-sales.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <!-- App root -->
  <script type="text/babel">
    const { useApp: rootUseApp } = window;

    // POS Shell (authenticated screens with sidebar)
    function POSShell() {
      const { state } = rootUseApp();
      const { screen } = state;
      return (
        <div className="h-full flex overflow-hidden">
          <Sidebar />
          {state.sidebarOpen && (
            <div
              className="lg:hidden fixed inset-0 bg-black/60 z-20"
              onClick={() => rootUseApp().dispatch({ type: 'CLOSE_SIDEBAR' })}
            />
          )}
          <div className="flex-1 flex flex-col min-w-0 overflow-hidden">
            <OfflineBanner />
            {screen === 'pos'       && <POSShellInner />}
            {screen === 'products'  && <ProductsScreen />}
            {screen === 'inventory' && <InventoryScreen />}
            {screen === 'sales'     && <SalesScreen />}
            {screen === 'sync'      && <SyncScreen />}
          </div>
        </div>
      );
    }

    // POS screen needs its own top-bar inside the shell
    function POSShellInner() {
      const { state, dispatch } = rootUseApp();
      return (
        <div className="flex flex-col h-full overflow-hidden">
          {/* POS Top Bar */}
          <header className="flex items-center gap-3 px-4 py-2.5 border-b border-zinc-800 bg-zinc-950 flex-shrink-0">
            <button
              onClick={() => dispatch({ type: 'TOGGLE_SIDEBAR' })}
              className="lg:hidden text-zinc-500 hover:text-zinc-200 p-1.5 rounded-lg hover:bg-zinc-800 transition-colors"
            >
              <IconMenu width="16" height="16" />
            </button>
            <div className="hidden sm:flex items-center gap-2">
              <div className="w-6 h-6 rounded-md bg-amber-500 flex items-center justify-center flex-shrink-0">
                <span className="text-black font-black text-xs">N</span>
              </div>
              <span className="text-xs font-semibold text-zinc-400">Checkout</span>
            </div>
            {/* Session info */}
            {state.session && (
              <div className="hidden md:flex items-center gap-2 px-3 py-1 bg-zinc-900 rounded-lg border border-zinc-800">
                <span className="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse" />
                <span className="text-xs text-zinc-400 font-mono">{state.session.id}</span>
              </div>
            )}
            <div className="flex-1" />
            <SyncBadge onClick={() => dispatch({ type: 'SET_SCREEN', payload: 'sync' })} />
            <button
              onClick={() => dispatch({ type: 'TOGGLE_ONLINE' })}
              title={state.isOnline ? 'Simulate offline' : 'Go online'}
              className={`w-8 h-8 rounded-lg flex items-center justify-center transition-colors ${state.isOnline ? 'text-zinc-600 hover:bg-zinc-800' : 'text-red-500 bg-red-950/40'}`}
            >
              {state.isOnline ? <IconWifi width="14" height="14"/> : <IconWifiOff width="14" height="14"/>}
            </button>
            <button
              onClick={() => dispatch({ type: 'SET_SCREEN', payload: 'session-close' })}
              className="flex items-center gap-1.5 px-3 py-1.5 text-xs text-zinc-500 hover:text-red-400 rounded-lg hover:bg-red-950/30 transition-all border border-transparent hover:border-red-900/40"
            >
              <IconLogout width="13" height="13" />
              <span className="hidden sm:inline">Close Session</span>
            </button>
          </header>
          <main className="flex-1 overflow-hidden">
            <POSScreen />
          </main>
        </div>
      );
    }

    // Tweaks
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accentColor": "#8B5CF6",
      "cartWidth": "320",
      "density": "default",
      "showSKU": true,
      "showStock": true
    }/*EDITMODE-END*/;

    function TweaksWrapper({ children }) {
      const { useTweaks, TweaksPanel, TweakSection, TweakColor, TweakSlider, TweakToggle, TweakSelect } = window;
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

      return (
        <div style={{ height: '100%' }}>
          {children}
          <TweaksPanel>
            <TweakSection label="Accent Color">
              <TweakColor
                value={t.accentColor}
                options={['#F59E0B','#3B82F6','#22C55E','#8B5CF6','#EF4444','#F97316']}
                onChange={v => {
                  setTweak('accentColor', v);
                  document.documentElement.style.setProperty('--accent', v);
                }}
              />
            </TweakSection>
            <TweakSection label="Cart Width">
              <TweakSlider
                label="Width (px)"
                value={parseInt(t.cartWidth)}
                min={260} max={440} step={20}
                onChange={v => setTweak('cartWidth', String(v))}
              />
            </TweakSection>
            <TweakSection label="Product Cards">
              <TweakToggle label="Show SKU" value={t.showSKU} onChange={v => setTweak('showSKU', v)} />
              <TweakToggle label="Show Stock" value={t.showStock} onChange={v => setTweak('showStock', v)} />
            </TweakSection>
            <TweakSection label="Density">
              <TweakSelect
                label="UI Density"
                value={t.density}
                options={['compact','default','comfortable']}
                onChange={v => setTweak('density', v)}
              />
            </TweakSection>
          </TweaksPanel>
        </div>
      );
    }

    // Root App
    function App() {
      const { state } = rootUseApp();
      const { screen } = state;

      const renderScreen = () => {
        if (screen === 'login')         return <LoginScreen />;
        if (screen === 'session-open')  return <SessionOpenScreen />;
        if (screen === 'session-close') return <SessionCloseScreen />;
        return <POSShell />;
      };

      return (
        <div style={{ height: '100%', fontFamily: "'Outfit', sans-serif" }}>
          <TweaksWrapper>
            {renderScreen()}
          </TweaksWrapper>
          <Toast toast={state.toast} />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <AppProvider>
        <App />
      </AppProvider>
    );
  </script>
</body>
</html>
